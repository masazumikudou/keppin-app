<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>欠品管理APP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; }

    h1 { padding: 14px 16px; background: #fff; border-bottom: 1px solid #ddd; font-size: 18px; color: #333; }

    /* 担当者タブ */
    .staff-tabs { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 16px 0; background: #fff; border-bottom: 2px solid #e0e0e0; }
    .staff-tab { padding: 8px 18px; border-radius: 6px 6px 0 0; border: 1px solid #ddd; border-bottom: none; cursor: pointer; font-size: 14px; background: #f0f0f0; color: #666; }
    .staff-tab.active { background: #fff; color: #1a73e8; font-weight: bold; border-color: #1a73e8; border-bottom: 2px solid #fff; margin-bottom: -2px; }

    .content { padding: 16px; }

    /* 店舗タブ */
    .store-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .store-tab { padding: 6px 14px; border-radius: 20px; border: 1px solid #ddd; cursor: pointer; font-size: 13px; background: #f0f0f0; color: #666; }
    .store-tab.active { background: #1a73e8; color: #fff; border-color: #1a73e8; }

    /* 出荷ボタン */
    .btn-ship { padding: 10px 24px; background: #1a73e8; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; margin-top: 12px; width: 100%; }
    .btn-ship:hover { background: #1558b0; }
    .btn-ship:disabled { background: #aaa; cursor: not-allowed; }
    input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; }

    .badge-ok { color: #2e7d32; font-weight: bold; }
    .badge-ng { color: #c62828; font-weight: bold; }
    .empty { color: #999; font-size: 14px; padding: 20px 0; }

    /* ── PC：テーブル表示 ── */
    @media (min-width: 768px) {
      .content { padding: 20px; }
      table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
      th { background: #f8f8f8; padding: 10px 14px; text-align: left; font-size: 13px; color: #555; border-bottom: 1px solid #e0e0e0; }
      td { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid #f0f0f0; }
      tr:last-child td { border-bottom: none; }
      .card-list { display: none; }
      .btn-ship { width: auto; }
    }

    /* ── スマホ：カード表示 ── */
    @media (max-width: 767px) {
      table { display: none; }
      .card-list { display: flex; flex-direction: column; gap: 10px; }
      .card-item { background: #fff; border-radius: 8px; padding: 12px 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 12px; }
      .card-item.is-ok { border-left: 4px solid #2e7d32; }
      .card-item.is-ng { border-left: 4px solid #c62828; }
      .card-chk { flex-shrink: 0; }
      .card-body { flex: 1; }
      .card-sku { font-size: 15px; font-weight: bold; color: #333; }
      .card-meta { font-size: 12px; color: #888; margin-top: 3px; }
      .card-status { font-size: 13px; font-weight: bold; margin-top: 4px; }
      /* 合計タブのカード */
      .sum-card { background: #fff; border-radius: 8px; padding: 12px 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); border-left: 4px solid #c62828; margin-bottom: 10px; }
      .sum-card-sku { font-size: 15px; font-weight: bold; color: #333; }
      .sum-card-meta { font-size: 12px; color: #888; margin-top: 3px; }
    }
  </style>
</head>
<body>

<h1>欠品管理APP</h1>
<div class="staff-tabs" id="staffTabs"></div>
<div class="content" id="content"></div>

<script>
  const records = {{ records | tojson }};
  const staffList = {{ staff_list | tojson }};

  let currentStaff = null;
  let currentStore = null;

  function isMobile() { return window.innerWidth < 768; }

  function renderStaffTabs() {
    document.getElementById('staffTabs').innerHTML = staffList.map(name =>
      `<div class="staff-tab ${name === currentStaff ? 'active' : ''}" onclick="selectStaff('${name}')">${name}</div>`
    ).join('');
  }

  function selectStaff(name) {
    currentStaff = name;
    currentStore = '合計';
    renderStaffTabs();
    renderContent();
  }

  function selectStore(name) {
    currentStore = name;
    renderContent();
  }

  function renderContent() {
    const staffRecords = records.filter(r => (r['担当者名'] || r.staff_name) === currentStaff);
    const stores = ['合計', ...new Set(staffRecords.map(r => r['店舗名'] || r.store_name).filter(Boolean))];
    const storeTabs = stores.map(s =>
      `<div class="store-tab ${s === currentStore ? 'active' : ''}" onclick="selectStore('${s}')">${s}</div>`
    ).join('');

    let bodyHtml = '';

    if (currentStore === '合計') {
      const shortage = staffRecords.filter(r => r['欠品'] === '✖' || r.is_shortage == 1);
      const grouped = {};
      shortage.forEach(r => {
        const key = `${r['品番'] || r.sku}__${r['色'] || r.color}`;
        if (!grouped[key]) grouped[key] = { sku: r['品番'] || r.sku, color: r['色'] || r.color, qty: 0, stores: [] };
        grouped[key].qty += parseInt(r['数量'] || r.quantity || 0);
        const s = r['店舗名'] || r.store_name;
        if (!grouped[key].stores.includes(s)) grouped[key].stores.push(s);
      });
      const rows = Object.values(grouped).sort((a, b) => a.sku.localeCompare(b.sku));

      if (rows.length === 0) {
        bodyHtml = '<p class="empty">欠品データはありません</p>';
      } else {
        // PCテーブル
        const pcTable = `<table>
          <thead><tr><th>品番</th><th>色</th><th>合計数量</th><th>欠品店舗</th></tr></thead>
          <tbody>${rows.map(r =>
            `<tr><td>${r.sku}</td><td>${r.color}</td><td>${r.qty}</td><td>${r.stores.join('・')}</td></tr>`
          ).join('')}</tbody>
        </table>`;
        // スマホカード
        const spCards = `<div class="card-list">${rows.map(r =>
          `<div class="sum-card">
            <div class="sum-card-sku">❌ ${r.sku} <span style="color:#888;font-weight:normal;">${r.color}</span></div>
            <div class="sum-card-meta">合計 ${r.qty}個　｜　${r.stores.join('・')}</div>
          </div>`
        ).join('')}</div>`;
        bodyHtml = pcTable + spCards;
      }

    } else {
      const storeId = currentStore.replace(/[\s・]/g, '_');
      const storeRecords = staffRecords
        .filter(r => (r['店舗名'] || r.store_name) === currentStore)
        .sort((a, b) => (b['日付'] || b.date || '').localeCompare(a['日付'] || a.date || ''));

      if (storeRecords.length === 0) {
        bodyHtml = '<p class="empty">データはありません</p>';
      } else {
        // PCテーブル
        const pcTable = `<table>
          <thead><tr><th></th><th>日付</th><th>品番</th><th>色</th><th>数量</th><th>状態</th></tr></thead>
          <tbody>${storeRecords.map(r => {
            const isSh = r['欠品'] === '✖' || r.is_shortage == 1;
            const d = r['日付'] || r.date || '';
            const dateStr = d ? `${parseInt(d.split('-')[1])}/${parseInt(d.split('-')[2])}` : '';
            const sku = r['品番'] || r.sku || '';
            const color = r['色'] || r.color || '';
            const qty = r['数量'] || r.quantity || 0;
            const chk = isSh
              ? `<input type="checkbox" class="ship-chk ship-chk-${storeId}" value="${r.id || r['id']}" data-sku="${sku}" data-color="${color}" data-qty="${qty}">`
              : '';
            return `<tr id="row-${r.id || r['id']}">
              <td>${chk}</td><td>${dateStr}</td>
              <td>${sku}</td><td>${color}</td>
              <td>${qty}</td>
              <td class="${isSh ? 'badge-ng' : 'badge-ok'}">${isSh ? '❌欠品' : '✅完納'}</td>
            </tr>`;
          }).join('')}</tbody>
        </table>`;

        // スマホカード
        const spCards = `<div class="card-list">${storeRecords.map(r => {
          const isSh = r['欠品'] === '✖' || r.is_shortage == 1;
          const d = r['日付'] || r.date || '';
          const dateStr = d ? `${parseInt(d.split('-')[1])}/${parseInt(d.split('-')[2])}` : '';
          const sku = r['品番'] || r.sku || '';
          const color = r['色'] || r.color || '';
          const qty = r['数量'] || r.quantity || 0;
          const chk = isSh
            ? `<input type="checkbox" class="ship-chk ship-chk-${storeId}" value="${r.id || r['id']}" data-sku="${sku}" data-color="${color}" data-qty="${qty}">`
            : '<span style="width:18px;display:inline-block;"></span>';
          return `<div class="card-item ${isSh ? 'is-ng' : 'is-ok'}">
            <div class="card-chk">${chk}</div>
            <div class="card-body">
              <div class="card-sku">${sku}</div>
              <div class="card-meta">${color}　｜　${qty}個　｜　${dateStr}</div>
              <div class="card-status ${isSh ? 'badge-ng' : 'badge-ok'}">${isSh ? '❌欠品' : '✅完納'}</div>
            </div>
          </div>`;
        }).join('')}</div>`;

        bodyHtml = pcTable + spCards +
          `<button class="btn-ship" onclick="shipSelected('${storeId}')">選択した品番を出荷済みにする</button>`;
      }
    }

    document.getElementById('content').innerHTML = `
      <div class="store-tabs">${storeTabs}</div>
      ${bodyHtml}
    `;
  }

  async function shipSelected(storeId) {
    const checked = [...document.querySelectorAll(`.ship-chk-${storeId}:checked`)];
    if (checked.length === 0) { alert('出荷する品番を選択してください'); return; }
    if (!confirm(`${checked.length}件を出荷済みにしますか？\nOS2への登録とTN発注メール送信も行います。`)) return;

    // 店舗情報を records から取得
    const storeRecs = records.filter(r =>
      (r['担当者名'] || r.staff_name) === currentStaff &&
      (r['店舗名']   || r.store_name) === currentStore
    );
    const first     = storeRecs[0] || {};
    const storeName = first.store_name || first['店舗名'] || currentStore;
    const staffName = first.staff_name || first['担当者名'] || currentStaff;
    const storeCode = first.store_code || '';
    const today     = new Date().toISOString().split('T')[0];

    const ids   = checked.map(c => c.value);
    const items = checked.map(c => ({
      sku:      c.dataset.sku,
      color:    c.dataset.color,
      quantity: parseInt(c.dataset.qty || '0'),
    }));

    const resp = await fetch('/api/shortage/ship', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ ids, store_name: storeName, staff_name: staffName, store_code: storeCode, date: today, items }),
    });
    const data = await resp.json();

    if (data.success) {
      ids.forEach(id => {
        const rec = records.find(r => String(r.id || r['id']) === String(id));
        if (rec) { rec.is_shortage = 0; rec['欠品'] = '〇'; }
      });
      let msg = `${ids.length}件を出荷済みにしました。`;
      if (data.os2)  msg += '\nOS2登録: 完了';
      if (data.tn && data.tn.status === 'ok') msg += '\nTN発注メール: 送信済み';
      if (data.tn && data.tn.status === 'skipped') msg += '\nTN発注メール: 設定なしのためスキップ';
      alert(msg);
    } else {
      alert('エラーが発生しました: ' + (data.error || ''));
    }
    renderContent();
  }

  if (staffList.length > 0) selectStaff(staffList[0]);
</script>
</body>
</html>
